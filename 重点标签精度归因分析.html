<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重点标签精度归因分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; padding: 24px; }
  .container { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .kpi-card .label { font-size: 13px; color: #888; margin-bottom: 4px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; }
  .kpi-card .value.red { color: #e74c3c; } .kpi-card .value.orange { color: #e67e22; }
  .kpi-card .value.green { color: #27ae60; } .kpi-card .value.gray { color: #999; }
  .kpi-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .section h2 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: #f8f9fa; padding: 8px 10px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e0e0; white-space: nowrap; cursor: pointer; user-select: none; }
  .data-table th:hover { background: #eef0f3; }
  .data-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
  .data-table tr:hover { background: #f8f9ff; }
  .tag-red { color: #e74c3c; font-weight: 600; } .tag-orange { color: #e67e22; font-weight: 600; }
  .tag-green { color: #27ae60; font-weight: 600; } .tag-gray { color: #999; }
  .conf-high { color: #27ae60; font-weight: 600; } .conf-mid { color: #f39c12; font-weight: 600; } .conf-low { color: #999; }
  .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar label { font-size: 13px; color: #555; font-weight: 600; }
  .filter-bar select, .filter-bar input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #2980b9; }
  .count-info { font-size: 12px; color: #888; margin-left: 8px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #e74c3c; } .dot-orange { background: #e67e22; } .dot-green { background: #27ae60; } .dot-gray { background: #999; }
  .summary-row-total { background: #f0f7ff; font-weight: 600; }
  @media (max-width: 768px) { .kpi-grid { grid-template-columns: 1fr 1fr; } .filter-bar { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 重点标签精度归因分析</h1>
  <p class="subtitle">精度低是因为规则版本变更，还是本身精度就有问题？</p>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="label">🔴 规则变更导致</div>
      <div class="value red">11</div>
      <div class="sub">标签版本已变更 + F1&lt;0.7</div>
    </div>
    <div class="kpi-card">
      <div class="label">🔴 本身精度问题</div>
      <div class="value orange">22</div>
      <div class="sub">标签版本未变更 + F1&lt;0.7</div>
    </div>
    <div class="kpi-card">
      <div class="label">🟢 精度正常</div>
      <div class="value green">124</div>
      <div class="sub">F1 ≥ 0.7</div>
    </div>
    <div class="kpi-card">
      <div class="label">其他</div>
      <div class="value gray">7</div>
      <div class="sub">入库时无此规则/无版本记录</div>
    </div>
  </div>

  <!-- 总结明细 -->
  <div class="section">
    <h2>📊 总结明细</h2>
    <table class="data-table" id="summaryTable">

      <tbody id="summaryBody"></tbody>
    </table>
  </div>

  <!-- 全量表格 -->
  <div class="section">
    <h2>📋 重点标签精度归因表</h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-red"></div>规则变更导致</div>
      <div class="legend-item"><div class="legend-dot dot-orange"></div>本身精度问题</div>
      <div class="legend-item"><div class="legend-dot dot-green"></div>精度正常</div>
      <div class="legend-dot dot-gray"></div>其他
    </div>
    <div class="filter-bar">
      <label>模态：</label>
      <select id="filterModality"><option value="">全部</option><option value="文本">文本</option><option value="图片">图片</option><option value="视频">视频</option></select>
      <label>归因：</label>
      <select id="filterAttrib"><option value="">全部</option><option value="🔴规则变更导致">🔴规则变更导致</option><option value="🔴本身精度问题">🔴本身精度问题</option><option value="🟢精度正常">🟢精度正常</option><option value="🟢精度正常（规则已变更）">🟢精度正常（规则已变更）</option></select>
      <label>置信度：</label>
      <select id="filterConf"><option value="">全部</option><option value="置信">置信</option><option value="相对置信">相对置信</option><option value="不置信">不置信</option></select>
      <label>版本变更：</label>
      <select id="filterVersion"><option value="">全部</option><option value="是">是</option><option value="否">否</option></select>
      <label>标签ID：</label>
      <input id="filterLabel" type="text" placeholder="输入标签ID" style="width:100px">
      <span class="count-info" id="countInfo"></span>
    </div>
    <table class="data-table" id="mainTable">
      <thead><tr>
        <th>模态</th><th>标签ID</th><th>样本数</th><th>TP</th><th>FP</th><th>FN</th><th>TN</th>

        <th>入库版本号</th><th>当前版本号</th><th>归因判断</th>
      </tr></thead>
      <tbody id="mainBody"></tbody>
    </table>
  </div>
</div>

function renderSummary() {
  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = '';
  SUMMARY_DATA.forEach(r => {
    const isTotal = r['模态'] === '合计';
    const tr = document.createElement('tr');
    if (isTotal) tr.className = 'summary-row-total';
    let attribClass = '';
    if (r['归因'].includes('规则变更导致') && r['归因'].includes('🔴')) attribClass = 'tag-red';
    else if (r['归因'].includes('本身精度问题')) attribClass = 'tag-orange';
    else if (r['归因'].includes('精度正常')) attribClass = 'tag-green';
    else attribClass = 'tag-gray';
    tr.innerHTML = `<td class="${attribClass}">${r['归因']}</td><td>${r['模态']}</td><td>${r['标签数']}</td><td>${r['平均F1']}</td><td>${r['平均P']}</td><td>${r['平均R']}</td><td>${r['置信']}</td><td>${r['相对置信']}</td><td>${r['不置信']}</td>`;
    tbody.appendChild(tr);
  });
}

function renderTable() {
  const fMod = document.getElementById('filterModality').value;
  const fAttrib = document.getElementById('filterAttrib').value;
  const fConf = document.getElementById('filterConf').value;
  const fVer = document.getElementById('filterVersion').value;
  const fLabel = document.getElementById('filterLabel').value.trim();

  let filtered = TABLE_DATA.filter(r => {
    if (fMod && r['模态'] !== fMod) return false;
    if (fAttrib && r['归因判断'] !== fAttrib) return false;
    if (fConf && r['置信度'] !== fConf) return false;
    if (fVer && r['规则版本是否变更'] !== fVer) return false;
    if (fLabel && String(r['标签ID']) !== fLabel) return false;
    return true;
  });

  document.getElementById('countInfo').textContent = `显示 ${filtered.length} / ${TABLE_DATA.length} 条`;

  const tbody = document.getElementById('mainBody');
  tbody.innerHTML = '';
  filtered.forEach(r => {
    const tr = document.createElement('tr');
    let attribClass = '';
    if (r['归因判断'].includes('规则变更导致') && r['归因判断'].includes('🔴')) attribClass = 'tag-red';
    else if (r['归因判断'].includes('本身精度问题')) attribClass = 'tag-orange';
    else if (r['归因判断'].includes('精度正常')) attribClass = 'tag-green';
    else attribClass = 'tag-gray';
    let confClass = '';
    if (r['置信度'] === '置信') confClass = 'conf-high';
    else if (r['置信度'] === '相对置信') confClass = 'conf-mid';
    else confClass = 'conf-low';
    tr.innerHTML = `<td>${r['模态']}</td><td>${r['标签ID']}</td><td>${r['样本数']}</td><td>${r['TP']}</td><td>${r['FP']}</td><td>${r['FN']}</td><td>${r['TN']}</td><td>${r['Precision']}</td><td>${r['Recall']}</td><td>${r['F1']}</td><td class="${confClass}">${r['置信度']}</td><td>${r['规则版本是否变更']}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r['入库版本号']}">${r['入库版本号']}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r['当前版本号']}">${r['当前版本号']}</td><td class="${attribClass}">${r['归因判断']}</td>`;
    tbody.appendChild(tr);
  });
}
